[build]
builder = "nixpacks"
[deploy]
startCommand = "gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
[[mounts]]
mountPath = "/app/csvdata"
# ── Cron jobs (all times UTC — IST = UTC+5:30) ───────────────────────────────
#
# NOTE: Engine no longer auto-starts via cron.
# It starts automatically after OAuth login (auth callback at ~7:30 AM IST).
# Cron /cron/start below is a FALLBACK only — fires at 9:00 AM IST if
# auth was done before cron ran (e.g. token already valid from yesterday).
#
[[cronJobs]]
# Fallback start at 9:00 AM IST = 3:30 UTC (only fires if engine not already running)
schedule = "0 2 * * 1-5"
command  = "curl -s -X POST http://localhost:$PORT/cron/start"
[[cronJobs]]
# Auto-stop engine at 6:30 PM IST = 13:00 UTC (after EOD CSV update at 5:02 PM)
schedule = "0 13 * * 1-5"
command  = "curl -s -X POST http://localhost:$PORT/cron/stop"
[[cronJobs]]
# EOD CSV update at 5:02 PM IST = 11:32 UTC (backup — eod_updater.py fires at 4:31 PM IST internally)
schedule = "32 11 * * 1-5"
command  = "curl -s -X POST http://localhost:$PORT/eod_update"